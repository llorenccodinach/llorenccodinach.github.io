<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bofill - Comparador de preus</title>
    <link rel="shortcut icon" href="./logobofill .png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    
    <script src="./scripts/xlsx.full.min.js"></script>
    <script src="./scripts/html2pdf.bundle.min.js"></script>

    <style>
        .loader {
          width: 60px;
          aspect-ratio: 2;
          --_g: no-repeat radial-gradient(circle closest-side,#000 90%,#0000);
          background: 
            var(--_g) 0%   50%,
            var(--_g) 50%  50%,
            var(--_g) 100% 50%;
          background-size: calc(100%/3) 50%;
          animation: l3 1s infinite linear;
        }
        @keyframes l3 {
            20%{background-position:0%   0%, 50%  50%,100%  50%}
            40%{background-position:0% 100%, 50%   0%,100%  50%}
            60%{background-position:0%  50%, 50% 100%,100%   0%}
            80%{background-position:0%  50%, 50%  50%,100% 100%}
        }
    </style>
    
</head>
<body>
    <div id="load" style="height: 100%; width: 100%;align-items: center; justify-content: center; display: flex;">
        <div>
            <div class="loader"></div>
        </div>
    </div>
    
    <div id="page" style="height: 100%; width: 100%; display: none;">
        
        

        <div style="height: 100px; width: 100%;display: flex;justify-content: center;">
            
            <h1 style="font-size: 50px;margin-top: 30px;">Bofill Pricing Tool</h1>
            <img style="position: absolute;left: 10px;top: 10px;height: 80px;" src="./img/logobofill.png" alt="">
            <p style="position: absolute;top: 5px;right: 5px;cursor: pointer;text-decoration-line:underline;">Read the terms and conditions</p>
            <button title="Imprimir/Descargar" style="position: absolute;right: 10px; top: 35px;background-color: transparent;border: none;cursor: pointer;" id="download"><img style="height: 50px;" src="./img/download.svg" alt=""></button>
            <div id="loader-download" style="position: absolute;width: 30px;right:90px;top: 50px;display: none;" class="loader"></div>
        <script>
            document.getElementById('download').addEventListener('mousedown', function() {
                document.getElementById("loader-download").style.display = "block";
                let inputs = document.querySelectorAll("input");
                for (let i = 0; i < inputs.length; i++) {
                    inputs[i].style.paddingTop = "8px";
                }
                let selects = document.querySelectorAll("select")
                for (let i = 0; i < selects.length; i++) {
                    selects[i].style.paddingTop = "8px";
                }
                
                var element = document.getElementById('page');
                var opt = {
                    margin:       [0.5, 0.5, 0.5, 0.5], // Márgenes: [superior, izquierda, inferior, derecha] en pulgadas
                    filename:     'Bofill-Pricing-Tool.pdf',
                    image:        { type: 'jpeg', quality: 0.98 },
                    html2canvas:  { scale: 2 }, // Escala para mejorar la calidad
                    jsPDF:        { unit: 'in', format: 'b2', orientation: 'portrait' } // Formato de página y orientación
                };
                html2pdf().from(element).set(opt).save();
                
                setTimeout(hiddenLoaderDownload, 1000); 
                function hiddenLoaderDownload(){
                    document.getElementById("loader-download").style.display = "none";
                    for (let i = 0; i < inputs.length; i++) {
                    inputs[i].style.paddingTop = "0px";
                }
                for (let i = 0; i < selects.length; i++) {
                    selects[i].style.paddingTop = "0px";
                }
                }
                
            });
        </script>
        
        
        </div>
        <div class="windows" style="height: 70px; width: 100%;background-color: white;display: flex;padding: 5px;gap:10px;">
            <div class="windows-elements" style="display: flex; gap: 10px;">

            </div>
            
            <button title="Nueva ventana" onclick="newWindow()" style="height: 40px; width: 40px; background-color: white;border-radius: 10px;display: flex;justify-content: center;align-items: center;border: solid 1px black;position: relative;" class="cross">
                <span style="transform: translateX(-52%) rotate(0deg);width: 1.2em;" class="cross-X"></span>
                <span style="transform: translateX(-52%) rotate(90deg);width: 1.2em;" class="cross-Y"></span>
            </button>
        </div>
        <div class="comparador">
            <div class="container">
                <div id="Bofill" style="min-width: 710px;position: relative;" class="card-container">
                    <h3>BOFILL</h3>
                    <div id="div-discount-bofill" style="position:absolute; top:15px; right:15px; border: solid 1px; height: 40px;width: 105px;border-radius: 10px;">
                        <h3 style="font-size: 20px; margin-top: 5px;margin-left: 10px;">-</h3>
                        <input id="discount-bofill" class="input-discount" type="number" name="discount" min="0" max="99" value="0" id="">
                        
                        <h3 style="position: absolute;top: 10px;right: 15px;font-size: 20px; margin-top: -4px;margin-left: 10px;">%</h3>
                        <div style="z-index: 50;cursor: pointer;flex-direction: column;display: flex;gap: 0px;width: 20px;height: 100%;position: absolute;top: 0px;right: 5px;">
                            <button id="sumDiscount" style="background: transparent;border: none;height: 19px;width: 19px;cursor: pointer;"><img style="height: 19px;width: 19px;" src="./img/arrow-top.svg" alt=""></button>
                            <button id="restDiscount" style="background: transparent;border: none;height: 19px;width: 19px;cursor: pointer;"><img style="height: 19px;width: 19px;" src="./img/arrow-bottom.svg" alt=""></button>
                        </div>
                    </div>
                    <div style="position: absolute;top: 27px;left: 120px;width: 40px;" class="loader"></div>
                    <script src="scripts/script.js"></script>
                    <div class="products-container">
                    </div>
                    <div class="div-add-product">
                        <button title="Añadir producto" id="button-add-product" style="background-color: #b2b2b2;" class="cross">
                            <span style="transform: translateX(-52%) rotate(0deg);" class="cross-X"></span>
                            <span style="transform: translateX(-52%) rotate(90deg);" class="cross-Y"></span>
                        </button>
                    </div>
                    <div class="div-total-price" style="bottom: 60px;">
                        <h4>Total PVP:</h4>
                        <h4 id="total-pvpprice">XX.XX¤</h4>
                    </div>
                    <div class="div-total-price" style="color: #105378;">
                        <h4>Total precio neto:</h4>
                        <h4 id="total-netprice">XX.XX¤</h4>
                    </div>
                    
                </div>
            </div>
            <div class="comparar-mes">
                <button title="Añadir competidor" onclick="addCompetitor()" style="background-color: #b2b2b2;" class="cross">
                    <span style="transform: translateX(-52%) rotate(0deg);" class="cross-X"></span>
                    <span style="transform: translateX(-52%) rotate(90deg);" class="cross-Y"></span>
                </button>
            </div>
        </div>
        
        <div id="popup" class="popup" style="visibility:hidden;">
            <div id="popup-card" class="popup-card">
                <h3 style="font-size: 30px;margin: 40px;">BOFILL</h3>
                <button id="closePopupBofill" onclick="closePopup()" style="top:30px;right: 30px;" class="cross">
                    <span style="transform: translateX(-50%) rotate(45deg);" class="cross-X"></span>
                    <span style="transform: translateX(-50%) rotate(-45deg);" class="cross-Y"></span>
                </button>
                <div id="popup-filtre">
                    <div id="div-nombre" onclick="color(this)" class="filtre">
                        <input id="nombre" placeholder="NOMBRE" type="text">
                    </div>
                    <div id="div-referencia" onclick="color(this)" class="filtre">
                        <input id="referencia" placeholder="REFERENCIA" type="text">
                    </div>
                    <div id="div-filtre" class="filtre" onclick="color(this)">
                        <select id="filtre-categoria" class="select-filtre" name="CATEGORIA" title="CATEGORIA">
                            <option value="" disabled selected>CATEGORÍA</option>
                            <option value="DOBLE PARED">DOBLE PARED</option>
                            <option value="CONCÉNTRICO">CONCÉNTRICO</option>
                            <option value="SIMPLE PARED">SIMPLE PARED</option>
                            <option value="FLEXIBLE">FLEXIBLE</option>
                        </select>
                        <select id="filtre-familia" class="select-filtre" name="FAMILIA" title="FAMILIA">
                            <option value="" disabled selected>FAMILIA</option>
                        </select>
                        <select id="filtre-subfamilia" class="select-filtre" name="SUBFAMILIA" title="SUBFAMILIA">
                            <option value="" disabled selected>SUBFAMILIA</option>
                        </select>
                        <select id="filtre-diametro" class="select-filtre" name="DIAMETRO" title="DIAMETRO">
                            <option value="" selected>DIÁMETRO</option>
                            <option value="080">Ø080</option>
                            <option value="100">Ø100</option>
                            <option value="120">Ø120</option>
                            <option value="125">Ø125</option>
                            <option value="130">Ø130</option>
                            <option value="150">Ø150</option>
                            <option value="175">Ø175</option>
                            <option value="180">Ø180</option>
                            <option value="200">Ø200</option>
                            <option value="250">Ø250</option>
                            <option value="300">Ø300</option>
                            <option value="350">Ø350</option>
                            <option value="400">Ø400</option>
                            <option value="450">Ø450</option>
                            <option value="500">Ø500</option>
                            <option value="550">Ø550</option>
                            <option value="600">Ø600</option>
                            <option value="650">Ø650</option>
                            <option value="700">Ø700</option>
                        </select>
                    </div>
                    <div id="div-codigoean" onclick="color(this)" class="filtre">
                        <input id="codigoean" placeholder="CÓDIGO EAN" type="text">
                    </div>
                    <button id="deleteFilters" class="filtre-delete">
                        <img loading="lazy" style="height: 30px;" src="./img/borrar-filtres.svg" onerror="this.onerror=null; this.src='https://static.vecteezy.com/system/resources/previews/005/337/799/non_2x/icon-image-not-found-free-vector.jpg';" alt="">
                    </button>
                </div>
                <div id="all-products-popup" style="max-height: 573px; overflow-y: scroll;margin-block: 2em;">
                    <div class="products-favorites" style="width: 500px; width: 100%;display: flex; flex-wrap: wrap;justify-content: center; gap: 2rem;">
                        <div class="card-product">
                            <button id="favorites-white" style="align-items: center; justify-content: center;display: flex;height: 20px;width:20px;position:absolute;top:10px;right:10px;cursor:pointer;background:transparent;border:none;"> <img style=";height: 20px;width:20px;" id="favorites-white" src="./img/favorites-white.svg" alt=""> </button>
                            <img loading="lazy" src="./img/FOTOS DW GE/ADPBR.png" onerror="this.onerror=null; this.src='https://static.vecteezy.com/system/resources/previews/005/337/799/non_2x/icon-image-not-found-free-vector.jpg';" alt="">
                            <h5 id="name" style="font-size: 20px;white-space: nowrap;">ADPBR300</h5>
                            <p id="desc" style="font-size: 10px;margin-bottom: 20px;">Acoplamiento con brida DW GE Ø300</p>
                            <p id="ref" style="font-size: 10px;left: 10px;position:absolute; bottom:7px;">93020300</p>
                            <p id="diam" style="font-size: 10px;right: 10px;position:absolute; bottom:7px;">Ø300</p>
                            <p id="fam" style="display:none;">DW GE</p>
                            <p id="sfam" style="display:none;">20</p>
                            <p id="pvp" style="display:none;">268.8</p>
                            <p id="ean" style="display:none;">8435002863933</p>
                            </div>
                    </div>
                    <hr style="background-color: rgb(51, 51, 51); height: 5px; margin-left: 5%; width: 90%; margin-top: 30px; margin-bottom: 30px; display: block;">
                    <div id="products" class="products" style="width: 100%;display: flex; flex-wrap: wrap;justify-content: center; gap: 2rem;">
                        
                    </div>
                    <div class="products-favorites" style="height: 100px;width: 100%;display: flex;flex-wrap: wrap;justify-content: center;gap: 2rem;align-items: center;">
                        <button title="Página anterior" id="page-before" style="opacity: 50%;height: 50px;width: 50px;background: #b2b2b2;border: none;border-radius: 25px;cursor: pointer;">
                            <img style="height: 50px; width: 50px;" src="./img/arrow-left.svg" alt="">
                        </button>
                        <button title="Página siguiente" id="page-next" style="height: 50px;width: 50px;background: #b2b2b2;border: none;border-radius: 25px;cursor: pointer;">
                            <img style="height: 50px; width: 50px;" src="./img/arrow-right.svg" alt="">
                        </button>
                    </div>
                </div>
                
            </div>
        </div>

        <div id="popup-error" class="popup" style="visibility:hidden;">
            <div id="popup-card-error">
                <h3 style="font-size: 30px;margin: 40px; text-align: center;">ERROR</h3>
                <button onclick="closePopupError()" style="margin-left: 700px;top: 400px;" class="cross">
                    <span style="transform: translateX(-50%) rotate(45deg);" class="cross-X"></span>
                    <span style="transform: translateX(-50%) rotate(-45deg);" class="cross-Y"></span>
                </button>
            </div>
        </div>

        
    </div>
    
    <script src="scripts/script.js"></script>
    

    

</body>

</html>
